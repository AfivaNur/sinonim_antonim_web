<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuis</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body class="page quiz fade-in">
  <main class="container">
    <div class="quiz-header">
      <p>Kategori: <span id="quizCategory"></span></p>
      <p>Soal <span id="questionNumber">1</span></p>
    </div>

    <div class="quiz-card">
      <h2 id="questionText">Pertanyaan...</h2>
      <div class="options" id="optionsContainer"></div>
    </div>

    <div class="quiz-footer">
      <button class="btn btn-purple" onclick="goTo('pilih.html')">Kembali</button>
      <button class="btn btn-yellow" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
    </div>
  </main>
</body>
</html>
